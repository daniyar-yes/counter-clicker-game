<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click it!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
        rel="stylesheet">
    <link href="styles.css" rel="stylesheet" />
</head>

<body>
    <header>
        <div id="rules-section">
            <h2 class="section-title">Rules / goals</h2>
            <!-- Hello Teacher -->
            <p>Use '+,-' buttons to get the current number to fall within range prompted to you.</p>
        </div>

        <section id="scores-block">
            <h2 class="section-title scores-title">Top Scores</h2>
            <div id="best-score"></div>
        </section>
    </header>

    <main>
        <div id="game-start-section">
            <div>
                <button id="time-30-btn">30s</button>
                <button id="time-60-btn">60s</button>
            </div>

            <div>
                <label for="player-name">Name:</label>
                <div id="name-border">
                    <input id="player-name" type="text" placeholder="Player" />
                </div>
                <button id="pause-btn" disabled>Pause</button>
            </div>

            <div id="empty-name-warning">
                <span id="empty-warning-1"></span>
                <span id="empty-warning-2"></span>
            </div>

            <button id="start-btn">Start</button>
            <div id="countdown">0s</div>
        </div>

        <div>Current points: <span id="current-points">0</span></div>

        <div id="current-task-wrapper">
            Current task:
            <div id="task-range">Press Start</div>
            <div id="task-round"></div>
        </div>

        <div class="main-counter-row main-row-group">
            <button id="plus-one-btn">+1</button>
            <button id="minus-one-btn">-1</button>
            <button id="plus-ten-btn" disabled>+10</button>
            <button id="minus-ten-btn" disabled>-10</button>
            <button id="reset-count-btn">Reset</button>
            <button id="submit-btn">Submit</button>
        </div>

        <h4>Current number: <span id="counter">0</span></h4>

        <div id="boost-shop" class="main-row-group">
            <span id="boost-shop-label">Buy boosts</span>
            <button id="buy-plus-ten">Buy: +10</button>
            <button id="buy-minus-ten">Buy: -10</button>
            <button id="buy-plus-hundred">Buy: +100</button>
            <button id="buy-minus-hundred">Buy: -100</button>
        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
